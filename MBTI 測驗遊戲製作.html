<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#14100a">
<meta name="description" content="觀自在之光｜MBTI 對話遊戲 - 隱身於都市的木造咖啡廳，一團溫暖的光，陪你看清現在的你。">
<title>觀自在之光｜MBTI 對話遊戲</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #14100a;
  --bg-warm: #1f1810;
  --cream: #ede4d3;
  --cream-dim: #b8ac95;
  --gold: #e8b25c;
  --gold-bright: #f5c87a;
  --gold-dim: #8a6a35;
  --red-accent: #c8492c;
  --serif: 'Noto Serif TC', 'Songti TC', serif;
  --sans: 'Noto Sans TC', -apple-system, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--cream);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.7;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

body {
  background:
    radial-gradient(ellipse at 50% -10%, rgba(232,178,92,0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 110%, rgba(200,73,44,0.05) 0%, transparent 60%),
    var(--bg);
  position: relative;
  min-height: 100vh;
  min-height: 100dvh;
}

/* wood grain texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(90deg, transparent 0, transparent 110px, rgba(232,178,92,0.014) 110px, rgba(232,178,92,0.014) 111px),
    repeating-linear-gradient(0deg, transparent 0, transparent 220px, rgba(232,178,92,0.010) 220px, rgba(232,178,92,0.010) 221px);
  pointer-events: none;
  z-index: 0;
}

/* grain noise */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");
  opacity: 0.045;
  pointer-events: none;
  z-index: 1;
  mix-blend-mode: overlay;
}

#app {
  position: relative;
  z-index: 2;
  max-width: 680px;
  margin: 0 auto;
  padding: 36px 24px 48px;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* The light orb */
.orb-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 130px;
  margin-bottom: 14px;
  position: relative;
}

.orb {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, var(--gold-bright) 0%, var(--gold) 28%, var(--gold-dim) 65%, transparent 100%);
  box-shadow:
    0 0 40px rgba(232,178,92,0.55),
    0 0 90px rgba(232,178,92,0.28),
    0 0 140px rgba(232,178,92,0.12);
  animation: breathe 4s ease-in-out infinite;
  position: relative;
}

.orb::before {
  content: '';
  position: absolute;
  inset: -25%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,178,92,0.18) 0%, transparent 60%);
  animation: halo 4s ease-in-out infinite;
}

.orb::after {
  content: '';
  position: absolute;
  inset: 12%;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, rgba(255,240,200,0.6) 0%, transparent 40%);
}

@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

@keyframes halo {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.18); opacity: 1; }
}

/* Dialogue */
.dialogue {
  flex: 1;
  font-family: var(--serif);
  font-size: 17px;
  line-height: 2.0;
  color: var(--cream);
  letter-spacing: 0.025em;
  padding: 0 6px;
  min-height: 140px;
  margin-bottom: 28px;
  font-weight: 400;
}

.dialogue br + br {
  display: block;
  content: '';
  margin-top: 0.6em;
}

.cursor {
  display: inline-block;
  width: 7px;
  height: 1.05em;
  background: var(--gold);
  vertical-align: text-bottom;
  animation: blink 0.85s steps(2, start) infinite;
  margin-left: 3px;
  box-shadow: 0 0 8px rgba(232,178,92,0.6);
}

@keyframes blink {
  to { visibility: hidden; }
}

/* Choices */
.choices {
  display: flex;
  flex-direction: column;
  gap: 9px;
  margin-top: auto;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  pointer-events: none;
}

.choices.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.choice {
  background: rgba(232,178,92,0.04);
  border: 1px solid rgba(232,178,92,0.18);
  color: var(--cream);
  padding: 13px 20px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 400;
  border-radius: 2px;
  cursor: pointer;
  text-align: left;
  transition: all 0.18s ease;
  letter-spacing: 0.04em;
  position: relative;
}

.choice:hover {
  background: rgba(232,178,92,0.10);
  border-color: rgba(232,178,92,0.45);
  transform: translateX(3px);
}

.choice:active {
  transform: translateX(3px) scale(0.99);
}

.choice::before {
  content: '▸';
  color: var(--gold);
  margin-right: 12px;
  opacity: 0.55;
  transition: opacity 0.2s;
}

.choice:hover::before {
  opacity: 1;
}

/* Stagger animation for choices */
.choices.show .choice {
  animation: choiceIn 0.4s ease backwards;
}
.choices.show .choice:nth-child(1) { animation-delay: 0.05s; }
.choices.show .choice:nth-child(2) { animation-delay: 0.13s; }
.choices.show .choice:nth-child(3) { animation-delay: 0.21s; }
.choices.show .choice:nth-child(4) { animation-delay: 0.29s; }

@keyframes choiceIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Back button */
.back-bar {
  position: absolute;
  top: 18px;
  left: 18px;
  z-index: 10;
}

.back-btn {
  background: transparent;
  border: 1px solid rgba(232,178,92,0.25);
  color: var(--gold-dim);
  padding: 6px 14px;
  font-family: var(--sans);
  font-size: 11px;
  cursor: pointer;
  letter-spacing: 0.15em;
  border-radius: 2px;
  transition: all 0.2s ease;
  visibility: hidden;
}

.back-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(232,178,92,0.06);
}

/* Top progress */
.progress {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: rgba(232,178,92,0.06);
  z-index: 100;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-bright));
  transition: width 0.6s ease;
  width: 0%;
  box-shadow: 0 0 8px rgba(232,178,92,0.4);
}

/* Title screen */
.title-screen {
  text-align: center;
  padding: 80px 0 40px;
  animation: fadeIn 1s ease;
}

.title-screen .seal {
  font-family: var(--serif);
  font-size: 12px;
  color: var(--gold-dim);
  letter-spacing: 0.6em;
  margin-bottom: 28px;
}

.title-screen h1 {
  font-family: var(--serif);
  font-size: 38px;
  color: var(--gold);
  letter-spacing: 0.18em;
  margin-bottom: 14px;
  font-weight: 500;
  line-height: 1.3;
  text-shadow: 0 0 30px rgba(232,178,92,0.3);
}

.title-screen .subtitle {
  font-size: 12px;
  color: var(--cream-dim);
  letter-spacing: 0.45em;
  margin-bottom: 56px;
}

.title-screen .desc {
  font-family: var(--serif);
  font-size: 15px;
  line-height: 2;
  color: var(--cream);
  max-width: 460px;
  margin: 0 auto 56px;
  opacity: 0.85;
}

.start-btn {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 16px 48px;
  font-family: var(--serif);
  font-size: 16px;
  cursor: pointer;
  letter-spacing: 0.3em;
  transition: all 0.3s;
  border-radius: 2px;
  position: relative;
}

.start-btn:hover {
  background: rgba(232,178,92,0.1);
  box-shadow: 0 0 20px rgba(232,178,92,0.3);
  letter-spacing: 0.4em;
}

/* Result page */
.result {
  text-align: center;
  padding: 24px 0 32px;
  animation: fadeUp 1s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-image {
  width: 220px;
  height: 220px;
  margin: 0 auto 28px;
  border: 1px solid rgba(232,178,92,0.35);
  border-radius: 4px;
  background:
    radial-gradient(circle at 30% 25%, rgba(232,178,92,0.18) 0%, transparent 65%),
    rgba(31,24,16,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.result-image::after {
  content: '';
  position: absolute;
  inset: 8px;
  border: 1px dashed rgba(232,178,92,0.18);
  pointer-events: none;
}

.result-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
}

.result-image .ph {
  font-family: var(--serif);
  font-size: 13px;
  color: var(--gold-dim);
  letter-spacing: 0.15em;
  z-index: 0;
}

.result-name {
  font-family: var(--serif);
  font-size: 48px;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: 0.15em;
  margin-bottom: 6px;
  line-height: 1.2;
  text-shadow: 0 0 30px rgba(232,178,92,0.25);
}

.result-mbti {
  font-size: 12px;
  color: var(--cream-dim);
  letter-spacing: 0.45em;
  margin-bottom: 10px;
}

.result-tag {
  font-family: var(--serif);
  font-size: 16px;
  color: var(--cream);
  margin-bottom: 40px;
  letter-spacing: 0.05em;
}

.result-section {
  text-align: left;
  margin: 32px 0;
}

.result-section h3 {
  font-family: var(--serif);
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 0.45em;
  margin-bottom: 4px;
  font-weight: 500;
  text-align: center;
}

.divider {
  width: 50px;
  height: 1px;
  background: var(--gold-dim);
  margin: 8px auto 18px;
  opacity: 0.5;
}

.result-section .body {
  font-family: var(--serif);
  font-size: 16px;
  line-height: 2;
  color: var(--cream);
  padding: 0 4px;
}

.result-section .body p { margin-bottom: 0.8em; }
.result-section .body p:last-child { margin-bottom: 0; }

.scores {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 22px;
  margin: 36px 0 12px;
  padding: 20px 18px;
  background: rgba(232,178,92,0.04);
  border: 1px solid rgba(232,178,92,0.15);
  border-radius: 2px;
}

.score-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--cream-dim);
  letter-spacing: 0.1em;
}

.score-row .lbl {
  width: 12px;
  font-weight: 700;
  color: var(--gold);
  font-family: var(--sans);
  font-size: 12px;
}

.score-row .bar {
  flex: 1;
  height: 3px;
  background: rgba(232,178,92,0.15);
  position: relative;
  border-radius: 2px;
  overflow: hidden;
}

.score-row .fill {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright));
  width: 0;
  transition: width 1.4s cubic-bezier(0.2, 0.7, 0.3, 1) 0.4s;
}

.score-row .pct {
  font-size: 10px;
  width: 32px;
  text-align: right;
  color: var(--gold-dim);
  font-family: var(--sans);
}

.result-actions {
  display: flex;
  gap: 12px;
  margin-top: 36px;
  justify-content: center;
  flex-wrap: wrap;
}

.result-btn {
  background: transparent;
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  padding: 12px 26px;
  font-family: var(--serif);
  font-size: 14px;
  cursor: pointer;
  letter-spacing: 0.2em;
  transition: all 0.25s;
  border-radius: 2px;
}

.result-btn:hover {
  background: rgba(232,178,92,0.1);
  border-color: var(--gold);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-warm);
  border: 1px solid var(--gold-dim);
  color: var(--cream);
  padding: 12px 24px;
  font-size: 13px;
  font-family: var(--sans);
  letter-spacing: 0.1em;
  border-radius: 2px;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  z-index: 200;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Skip hint */
.skip-hint {
  position: absolute;
  bottom: -22px;
  right: 6px;
  font-size: 10px;
  color: var(--gold-dim);
  letter-spacing: 0.2em;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  font-family: var(--sans);
}

.dialogue.typing .skip-hint {
  opacity: 0.6;
  animation: hintBlink 2s ease-in-out infinite;
}

@keyframes hintBlink {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.7; }
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Mobile */
@media (max-width: 500px) {
  #app { padding: 28px 18px 36px; }
  .dialogue { font-size: 16px; line-height: 1.95; }
  .orb { width: 64px; height: 64px; }
  .orb-container { height: 100px; }
  .title-screen { padding: 60px 0 30px; }
  .title-screen h1 { font-size: 30px; }
  .title-screen .desc { font-size: 14px; }
  .result-name { font-size: 38px; }
  .result-image { width: 180px; height: 180px; }
  .scores { grid-template-columns: 1fr; }
  .choice { padding: 12px 16px; font-size: 14px; }
  .start-btn { padding: 14px 36px; font-size: 15px; }
}

@media (max-height: 700px) {
  .orb-container { height: 90px; margin-bottom: 8px; }
  .orb { width: 60px; height: 60px; }
  #app { padding-top: 24px; }
}
</style>
</head>
<body>
<div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ========================================
// DATA
// ========================================

const SCENES = {
  opening: `都市的雨剛停。

你拐進一條沒走過的巷子，看見一塊木牌：今日營業中。

推開門，沒有風鈴聲，只有木頭和老咖啡的氣味。店裡空無一人——不，吧台後面好像有什麼東西。一團溫暖的光，靜靜地懸在那裡，像在等你。

「來啦。」光開口了，聲音不大不小，剛好像在你耳邊。

「2026 年，火馬年。今年人心翻得很厲害，你能走進這扇門，表示你大概也有點感覺了——某些東西，該重新整理了。」

「別緊張，我不是來給你算命的。我是來陪你看看『現在的你』長什麼樣子。等你看清楚了，要不要 reset，那是你的事。」

「我會問你一些問題。沒有對錯，憑直覺就好。」`,

  coffee: `「沒問題。」光輕輕飄了一下，「這裡的咖啡是我請客。別問我哪來的，問就是火馬年。」

一杯熱熱的東西就這樣出現在你面前。你不知道它什麼時候煮的。

「喝慢一點。我們有時間。」`,

  break1: `光停下來，像是在感覺什麼。

「嗯。我大概看到一點輪廓了。」

「不過別太快下結論——人是很多層的。下一輪我要問的，是你怎麼安排你自己的時間和節奏。」

「需要喝口水嗎？」`,

  break2: `「一半了。」光的光暈柔柔地擴開一點。

「我看你撐得不錯。很多人到這裡會開始想『我答的這些是對的嗎？』——別擔心，沒有對的，只有真的。」

「下半場我要問的，是你怎麼接收這個世界的訊息，還有你怎麼做選擇。這部分通常會讓人想得比較久一點。」

「準備好了再點。」`,

  break3: `光的顏色微微變深了一點。

「最後一段了。這一段，是我最在意的——你怎麼做選擇。」

「人生裡每一個岔路，都是這些選擇堆出來的。所以慢慢答，沒關係。」`,

  closing: `光靜了一下。

你忽然意識到，咖啡廳外面的雨已經完全停了。

「夠了。」光說，「我看完你了。」

「不是看完『你以為的你』喔——是看完『你剛剛一題一題告訴我的你』。這兩個有時候差很多，你等下會知道。」

「2026 火馬年，人心翻得很厲害——但你願意走到這裡，已經比大多數人多走了一步。」

「來，看看我看到的你。」`
};

// 64 questions, each with dimension (EI/JP/SN/TF), polarity (E/I/J/P/S/N/T/F), and dialogue text
const QUESTIONS = [
  // E (8)
  { dim:'EI', pol:'E', text:`你享受擁有寬廣的交友圈，喜歡身邊一直有人。` },
  { dim:'EI', pol:'E', text:`遇到突發狀況時，你通常是第一個有反應的人。` },
  { dim:'EI', pol:'E', text:`週末突然空出一天，你的第一個念頭是找人出來。` },
  { dim:'EI', pol:'E', text:`到一個全新的環境，你能很快和陌生人打成一片。` },
  { dim:'EI', pol:'E', text:`和一群人輕鬆對話的場合，會讓你感到舒服、有活力。` },
  { dim:'EI', pol:'E', text:`一群人在一起時，你常常自然而然地成為話最多的那個。` },
  { dim:'EI', pol:'E', text:`身處人多熱鬧的場合（演唱會、夜市、跨年），你整體感覺是享受的。` },
  { dim:'EI', pol:'E', text:`在半生不熟的場合，主動跟陌生人開口聊天，對你來說不是難事。` },

  // I (8)
  { dim:'EI', pol:'I', text:`要讓你「嗨起來」，需要花比較多的力氣。` },
  { dim:'EI', pol:'I', text:`你在人際互動上偏向保守，會和他人保持一點距離。` },
  { dim:'EI', pol:'I', text:`長時間社交之後，你會很想離開現場、找個地方一個人靜一靜。` },
  { dim:'EI', pol:'I', text:`比起熱鬧的聚會，你更喜歡一個人安靜地閱讀或獨處。` },
  { dim:'EI', pol:'I', text:`外面很吵的時候，你會本能地想把自己跟外界隔開。` },
  { dim:'EI', pol:'I', text:`進到一個新空間時，你會把自己安放在不顯眼的角落，而不是中間。` },
  { dim:'EI', pol:'I', text:`閒下來的時候，你比較喜歡一個人安靜地放鬆。` },
  { dim:'EI', pol:'I', text:`要把心裡強烈的感覺說出口，對你來說有點困難。` },

  // J (8)
  { dim:'JP', pol:'J', text:`和人約時間見面，你幾乎不會遲到。` },
  { dim:'JP', pol:'J', text:`你會把每一段時間都用在刀口上，不喜歡虛度光陰。` },

// ========================================
// STATE
// ========================================

const state = {
  scene: 'title',
  questionIndex: 0,
  scores: { E:0, I:0, J:0, P:0, S:0, N:0, T:0, F:0 },
  shuffledQuestions: [],
  answerHistory: [], // each entry: { pol, polScore, revScore }
  typewriterTimer: null,
  isTyping: false,
  currentText: '',
  currentCallback: null
};

// ========================================
// SHUFFLE: avoid 4 consecutive same dimension
// ========================================

function shuffleQuestions(qs) {
  const buckets = { EI: [], JP: [], SN: [], TF: [] };
  qs.forEach(q => buckets[q.dim].push(q));
  Object.values(buckets).forEach(b => {
    for (let i = b.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [b[i], b[j]] = [b[j], b[i]];
    }
  });

  const result = [];
  let lastDims = [];
  while (result.length < qs.length) {
    let candidates = Object.keys(buckets).filter(d => buckets[d].length > 0);
    // exclude dim that would create 4-in-a-row
    if (lastDims.length >= 3 && lastDims[0] === lastDims[1] && lastDims[1] === lastDims[2]) {
      const blocked = lastDims[0];
      const filtered = candidates.filter(d => d !== blocked);
      if (filtered.length > 0) candidates = filtered;
    }
    // prefer larger buckets to spread out
    candidates.sort((a, b) => buckets[b].length - buckets[a].length);
    // small randomness within top 2
    const pick = candidates[Math.floor(Math.random() * Math.min(2, candidates.length))];
    result.push(buckets[pick].pop());
    lastDims.push(pick);
    if (lastDims.length > 3) lastDims.shift();
  }
  return result;
}

// ========================================
// TYPEWRITER
// ========================================

function typewrite(text, callback) {
  const el = document.getElementById('dialogue');
  if (!el) return;
  state.currentText = text;
  state.currentCallback = callback;
  state.isTyping = true;
  el.classList.add('typing');
  el.innerHTML = '<span class="cursor"></span>';
  let i = 0;
  let displayed = '';

  function tick() {
    if (i >= text.length) {
      state.isTyping = false;
      el.classList.remove('typing');
      el.innerHTML = textToHtml(displayed);
      if (state.currentCallback) state.currentCallback();
      return;
    }
    const ch = text[i];
    displayed += ch;
    el.innerHTML = textToHtml(displayed) + '<span class="cursor"></span>';
    i++;
    let delay = 32;
    if ('，、'.includes(ch)) delay = 80;
    if ('。？！'.includes(ch)) delay = 140;
    if ('「『'.includes(ch)) delay = 50;
    if (ch === '\n') delay = 180;
    state.typewriterTimer = setTimeout(tick, delay);
  }
  tick();
}

function skipTypewriter() {
  if (!state.isTyping) return;
  if (state.typewriterTimer) {
    clearTimeout(state.typewriterTimer);
    state.typewriterTimer = null;
  }
  state.isTyping = false;
  const el = document.getElementById('dialogue');
  el.classList.remove('typing');
  el.innerHTML = textToHtml(state.currentText);
  if (state.currentCallback) state.currentCallback();
}

function textToHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

// ========================================
// SCENE RENDERING
// ========================================

function renderTitleScreen() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="title-screen">
      <div class="seal">2026　火 馬 年</div>
      <h1>觀自在之光</h1>
      <div class="subtitle">M B T I 　對 話 遊 戲</div>
      <div class="desc">隱身於都市的木造咖啡廳。<br>一團溫暖的光，靜靜地懸在吧台後。<br>它陪你看清現在的你，<br>等你看清楚了——要不要 reset，那是你的事。</div>
      <button class="start-btn" onclick="startGame()">推 開 那 扇 門</button>
    </div>
  `;
}

function renderGameLayout() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="back-bar"><button class="back-btn" id="back-btn" onclick="goBackQuestion()">← 上一題</button></div>
    <div class="orb-container"><div class="orb"></div></div>
    <div class="dialogue" id="dialogue"></div>
    <div class="choices" id="choices"></div>
  `;
}

function startGame() {
  state.shuffledQuestions = shuffleQuestions(QUESTIONS);
  renderGameLayout();
  showOpening();
}

function showOpening() {
  state.scene = 'opening';
  hideChoices();
  setBackButton(false);
  typewrite(SCENES.opening, () => {
    showChoices([
      { text: '開始吧', action: startQuestions },
      { text: '等等，我想先點杯咖啡', action: showCoffee }
    ]);
  });
}

function showCoffee() {
  hideChoices();
  setBackButton(false);
  typewrite(SCENES.coffee, () => {
    showChoices([{ text: '好，開始吧', action: startQuestions }]);
  });
}

function startQuestions() {
  state.scene = 'question';
  state.questionIndex = 0;
  showCurrentQuestion();
}

function showCurrentQuestion() {
  hideChoices();
  setBackButton(state.questionIndex > 0);
  const q = state.shuffledQuestions[state.questionIndex];
  updateProgress();
  typewrite(q.text, () => {
    showChoices([
      { text: '對，就是我',  action: () => answerQuestion(0) },
      { text: '嗯，有點像',  action: () => answerQuestion(1) },
      { text: '不太對欸',    action: () => answerQuestion(2) },
      { text: '完全不是',    action: () => answerQuestion(3) }
    ]);
  });
}

function setBackButton(show) {
  const btn = document.getElementById('back-btn');
  if (btn) btn.style.visibility = show ? 'visible' : 'hidden';
}

function answerQuestion(choiceIndex) {
  const q = state.shuffledQuestions[state.questionIndex];
  const polScore = [3, 2, 1, 0][choiceIndex];
  const revScore = [0, 1, 2, 3][choiceIndex];
  state.scores[q.pol] += polScore;
  state.scores[reverseOf(q.pol)] += revScore;
  state.answerHistory[state.questionIndex] = { pol: q.pol, polScore, revScore };
  state.questionIndex++;

  if (state.questionIndex === 16) showBreak(SCENES.break1, '繼續');
  else if (state.questionIndex === 32) showBreak(SCENES.break2, '繼續');
  else if (state.questionIndex === 48) showBreak(SCENES.break3, '開始最後一段');
  else if (state.questionIndex >= state.shuffledQuestions.length) showClosing();
  else showCurrentQuestion();
}

function goBackQuestion() {
  if (state.questionIndex === 0) return;
  state.questionIndex--;
  // Roll back the score from the previous answer
  const prev = state.answerHistory[state.questionIndex];
  if (prev) {
    state.scores[prev.pol] -= prev.polScore;
    state.scores[reverseOf(prev.pol)] -= prev.revScore;
  }
  showCurrentQuestion();
}

function showBreak(text, btnText) {
  hideChoices();
  setBackButton(false);
  typewrite(text, () => {
    showChoices([{ text: btnText, action: showCurrentQuestion }]);
  });
}

function showClosing() {
  state.scene = 'closing';
  hideChoices();
  setBackButton(false);
  typewrite(SCENES.closing, () => {
    showChoices([{ text: '我準備好了', action: showResult }]);
  });
}

function showResult() {
  state.scene = 'result';
  const type = calculateType();
  const result = RESULTS[type];

  const ePct = Math.round(state.scores.E / 48 * 100);
  const sPct = Math.round(state.scores.S / 48 * 100);
  const tPct = Math.round(state.scores.T / 48 * 100);
  const jPct = Math.round(state.scores.J / 48 * 100);

  document.getElementById('progress-bar').style.width = '100%';

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="result">
      <div class="result-image">
        <span class="ph">[ ${result.name} ]</span>
        <img src="images/${type}.jpg" alt="${result.name}" onerror="this.style.display='none'">
      </div>
      <div class="result-name">${result.name}</div>
      <div class="result-mbti">${type.split('').join(' ')}</div>
      <div class="result-tag">${result.tag}</div>

      <div class="result-section">
        <h3>光 的 話</h3>
        <div class="divider"></div>
        <div class="body">${formatBody(result.reveal)}</div>
      </div>

      <div class="result-section">
        <h3>你 是 誰</h3>
        <div class="divider"></div>
        <div class="body">${formatBody(result.who)}</div>
      </div>

      <div class="result-section">
        <h3>火 馬 年 的 提 醒</h3>
        <div class="divider"></div>
        <div class="body">${formatBody(result.advice)}</div>
      </div>

      <div class="scores">
        ${scoreBar('E', 'I', ePct, 100 - ePct)}
        ${scoreBar('S', 'N', sPct, 100 - sPct)}
        ${scoreBar('T', 'F', tPct, 100 - tPct)}
        ${scoreBar('J', 'P', jPct, 100 - jPct)}
      </div>

      <div class="result-actions">
        <button class="result-btn" onclick="location.reload()">重 新 測 驗</button>
        <button class="result-btn" onclick="shareResult('${type}', '${result.name}', '${result.tag}')">複 製 結 果</button>
      </div>
    </div>
  `;

  // Animate score bars
  setTimeout(() => {
    document.querySelectorAll('.score-row .fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 200);

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function scoreBar(left, right, leftPct) {
  // Determine which side wins to highlight
  const winner = leftPct >= 50 ? 'left' : 'right';
  const winningPct = winner === 'left' ? leftPct : (100 - leftPct);
  const fillFromLeft = winner === 'left' ? leftPct : 0;
  const fillWidth = winner === 'left' ? leftPct : (100 - leftPct);
  return `<div class="score-row">
    <span class="lbl">${left}</span>
    <div class="bar"><div class="fill" data-pct="${winner === 'left' ? leftPct : 100 - leftPct}" style="${winner === 'right' ? 'right:0;left:auto;' : ''}"></div></div>
    <span class="lbl">${right}</span>
    <span class="pct">${winningPct}%</span>
  </div>`;
}

function formatBody(text) {
  // Wrap each paragraph (split by \n\n) in <p>
  return text.split(/\n\n+/).map(p => `<p>${textToHtml(p).replace(/<br>/g, '<br>')}</p>`).join('');
}

function reverseOf(pol) {
  return { E:'I', I:'E', J:'P', P:'J', S:'N', N:'S', T:'F', F:'T' }[pol];
}

function calculateType() {
  // tie rule: prefer reverse (I/N/F/P)
  const ei = state.scores.E > state.scores.I ? 'E' : 'I';
  const sn = state.scores.S > state.scores.N ? 'S' : 'N';
  const tf = state.scores.T > state.scores.F ? 'T' : 'F';
  const jp = state.scores.J > state.scores.P ? 'J' : 'P';
  return ei + sn + tf + jp;
}

function shareResult(type, name, tag) {
  const text = `我在《觀自在之光｜MBTI 對話遊戲》得到的結果是：\n\n${name}（${type}）\n${tag}\n\n2026 火馬年，你也來看看自己吧。`;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => showToast('已複製到剪貼簿'),
      () => showToast('複製失敗，請手動截圖')
    );
  } else {
    showToast('複製失敗，請手動截圖');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function showChoices(choices) {
  const el = document.getElementById('choices');
  if (!el) return;
  el.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = c.text;
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      c.action();
    });
    el.appendChild(btn);
  });
  setTimeout(() => el.classList.add('show'), 80);
}

function hideChoices() {
  const el = document.getElementById('choices');
  if (el) el.classList.remove('show');
}

function updateProgress() {
  const pct = (state.questionIndex / 64) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ========================================
// EVENT BINDINGS
// ========================================

document.addEventListener('click', (e) => {
  if (state.isTyping && !e.target.closest('.choice') && !e.target.closest('.start-btn') && !e.target.closest('.result-btn')) {
    skipTypewriter();
  }
});

// Keyboard support: Space/Enter to skip or advance
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter') {
    if (state.isTyping) {
      skipTypewriter();
      e.preventDefault();
    }
  }
});

// ========================================
// INIT
// ========================================

renderTitleScreen();
</script>
